<!DOCTYPE html>
<html lang="en" data-theme="dim">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="{{csp}}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script nonce="{{nonce}}" type="module" src="https://unpkg.com/cally"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script nonce="{{nonce}}" src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="{{styleUri}}" rel="stylesheet">
</head>

<body>
    <main class="page">
        <div class="mx-auto flex w-full max-w-7xl flex-col gap-5 px-4 py-5 sm:px-6 lg:px-8">

            <!-- HEADER -->
            <header class="topbar flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <div id="generatedAt" class="text-sm muted">Loading...</div>
                <div class="flex flex-wrap gap-2">
                    <button id="prevDay" class="btn btn-ghost btn-sm btn-square" data-tooltip="Previous day">
                        <i class="ri-arrow-left-s-line text-lg"></i>
                    </button>

                    <div class="relative">
                        <button id="dateButton" class="btn btn-outline btn-sm min-w-25 justify-between px-3"
                            data-tooltip="Open calendar">
                            <i class="ri-calendar-line"></i>
                            <span id="dateButtonLabel">Today</span>
                        </button>
                        <div id="datePopover" class="date-popover" hidden>
                            <calendar-date id="calendarDate"
                                class="cally bg-base-100 border border-base-300 shadow-lg rounded-box">
                                <svg aria-label="Previous" class="fill-current size-4" slot="previous"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path fill="currentColor" d="M15.75 19.5 8.25 12l7.5-7.5"></path>
                                </svg>
                                <svg aria-label="Next" class="fill-current size-4" slot="next"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path fill="currentColor" d="m8.25 4.5 7.5 7.5-7.5 7.5"></path>
                                </svg>
                                <calendar-month></calendar-month>
                            </calendar-date>
                        </div>
                    </div>

                    <button id="nextDay" class="btn btn-ghost btn-sm btn-square" data-tooltip="Next day">
                        <i class="ri-arrow-right-s-line text-lg"></i>
                    </button>

                    <button id="todayButton" class="btn btn-primary btn-sm px-2 text-[var(--vscode-editor-background)]"
                        data-tooltip="Jump to today">
                        <i class="ri-crosshair-2-line"></i>
                        Today
                    </button>

                    <button id="refresh" class="btn btn-ghost btn-sm btn-square" data-tooltip="Refresh data">
                        <i class="ri-refresh-line text-lg"></i>
                    </button>
                </div>
            </header>

            <!-- SUMMARY CARDS -->
            <section id="summaryGrid" class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4 translation">
                <div id="selectedDayCard" class="surface summary-card p-4"
                    data-tooltip="Coding time for the selected calendar day">
                    <div class="flex items-center justify-between gap-3">
                        <span class="text-sm muted">Selected Day</span>
                        <i class="ri-calendar-check-line text-teal-300"></i>
                    </div>
                    <div id="daySummaryTotal" class="mt-2 text-2xl font-semibold">0s</div>
                    <div id="daySummaryLabel" class="mt-1 truncate text-sm muted"></div>
                </div>

                <div id="todayCard" class="surface summary-card p-4 transition-all duration-300"
                    data-tooltip="Coding time recorded today">
                    <div class="flex items-center justify-between gap-3">
                        <span class="text-sm muted">Today</span>
                        <i class="ri-sun-line text-amber-300"></i>
                    </div>
                    <div id="todaySummaryTotal" class="mt-2 text-2xl font-semibold">0s</div>
                    <div id="todaySummaryMeta" class="mt-1 truncate text-sm muted"></div>
                </div>

                <div class="surface summary-card p-4" data-tooltip="Total coding time in the selected week">
                    <div class="flex items-center justify-between gap-3">
                        <span class="text-sm muted">Week</span>
                        <i class="ri-bar-chart-grouped-line text-sky-300"></i>
                    </div>
                    <div id="weekSummaryTotal" class="mt-2 text-2xl font-semibold">0s</div>
                    <div id="weekSummaryRange" class="mt-1 truncate text-sm muted"></div>
                </div>

                <div class="surface summary-card p-4" data-tooltip="All coding time stored in the local db">
                    <div class="flex items-center justify-between gap-3">
                        <span class="text-sm muted">Total Time</span>
                        <i class="ri-infinity-line text-rose-300"></i>
                    </div>
                    <div id="lifetimeSummaryTotal" class="mt-2 text-2xl font-semibold">0s</div>
                    <div id="yearSummaryTotal" class="mt-1 truncate text-sm muted"></div>
                </div>
            </section>

            <!-- MAIN PERIOD TABS -->
            <div role="tablist" class="tabs-row justify-center">
                <button class="ui-tab active" data-period="day" role="tab" aria-controls="dayPanel">
                    <i class="ri-time-line"></i> Day
                </button>
                <button class="ui-tab" data-period="week" role="tab" aria-controls="weekPanel">
                    <i class="ri-bar-chart-line"></i> Week
                </button>
                <button class="ui-tab" data-period="year" role="tab" aria-controls="yearPanel">
                    <i class="ri-line-chart-line"></i> Year
                </button>
            </div>

            <!-- DAY PANEL -->
            <section id="dayPanel" class="tab-panel surface p-4" aria-live="polite">
                <div class="flex flex-col items-center gap-3">
                    <div id="donut" class="donut-wrap">
                        <svg class="donut-svg" viewBox="0 0 100 100" aria-hidden="true">
                            <circle class="donut-track" cx="50" cy="50" r="42"></circle>
                            <g id="donutSegments"></g>
                        </svg>
                        <div class="donut-center">
                            <div id="donutValue" class="text-2xl font-semibold">0s</div>
                            <div id="donutLabel" class="mt-1 text-xs muted">Projects</div>
                        </div>
                    </div>
                    <div class="w-full max-w-sm text-center">
                        <div id="dayLabel" class="text-base font-semibold"></div>
                        <div class="mt-1 flex flex-wrap items-center justify-center gap-x-4 gap-y-1 text-sm muted">
                            <span>Today <b id="todayMetric" class="font-semibold text-current">0s</b></span>
                            <span>Total <b id="lifetimeMetric" class="font-semibold text-current">0s</b></span>
                        </div>
                    </div>
                </div>

                <div class="mt-4 min-w-0">
                    <div role="tablist" class="tabs-row justify-center">
                        <button class="ui-tab active" data-breakdown="projects" role="tab"
                            data-tooltip="Color by project">
                            <i class="ri-folder-chart-line"></i> Projects
                        </button>
                        <button class="ui-tab" data-breakdown="languages" role="tab" data-tooltip="Color by language">
                            <i class="ri-code-s-slash-line"></i> Languages
                        </button>
                        <button class="ui-tab" data-breakdown="files" role="tab" data-tooltip="Color by file">
                            <i class="ri-file-list-3-line"></i> Files
                        </button>
                    </div>
                    <div id="breakdownList" class="mt-4 grid gap-4"></div>
                </div>
            </section>

            <!-- WEEK PANEL -->
            <section id="weekPanel" class="tab-panel surface p-4" hidden aria-live="polite">
                <div class="mb-4 flex flex-col gap-1 sm:flex-row sm:items-end sm:justify-between">
                    <div>
                        <h2 class="text-lg font-semibold">Week</h2>
                        <div id="weekSubtitle" class="text-sm muted"></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="prevWeek" class="btn btn-ghost btn-sm btn-square" data-tooltip="Previous week">
                            <i class="ri-arrow-left-s-line text-lg"></i>
                        </button>
                        <div id="weekTotal" class="text-2xl font-semibold">0s</div>
                        <button id="nextWeek" class="btn btn-ghost btn-sm btn-square" data-tooltip="Next week">
                            <i class="ri-arrow-right-s-line text-lg"></i>
                        </button>
                    </div>
                </div>

                <div id="weekChart" class="chart week"></div>

                <div class="mt-5">
                    <div role="tablist" class="tabs-row">
                        <button class="ui-tab active" data-week-breakdown="projects" role="tab"
                            data-tooltip="Color by project">
                            <i class="ri-folder-chart-line"></i> Projects
                        </button>
                        <button class="ui-tab" data-week-breakdown="languages" role="tab"
                            data-tooltip="Color by language">
                            <i class="ri-code-s-slash-line"></i> Languages
                        </button>
                        <button class="ui-tab" data-week-breakdown="files" role="tab" data-tooltip="Color by file">
                            <i class="ri-file-list-3-line"></i> Files
                        </button>
                    </div>
                    <div id="weekBreakdownList" class="mt-4 grid gap-3"></div>
                </div>
            </section>

            <!-- YEAR PANEL -->
            <section id="yearPanel" class="tab-panel surface p-4" hidden aria-live="polite">
                <div class="mb-4 flex flex-col gap-1 sm:flex-row sm:items-end sm:justify-between">
                    <div>
                        <h2 id="yearTitle" class="text-lg font-semibold">Year</h2>
                        <div class="text-sm muted">Monthly coding time</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="prevYear" class="btn btn-ghost btn-sm btn-square" data-tooltip="Previous year">
                            <i class="ri-arrow-left-s-line text-lg"></i>
                        </button>
                        <div id="yearTotal" class="text-2xl font-semibold">0s</div>
                        <button id="nextYear" class="btn btn-ghost btn-sm btn-square" data-tooltip="Next year">
                            <i class="ri-arrow-right-s-line text-lg"></i>
                        </button>
                    </div>
                </div>

                <div id="yearChart" class="chart year"></div>

                <div class="mt-5">
                    <div role="tablist" class="tabs-row">
                        <button class="ui-tab active" data-year-breakdown="projects" role="tab"
                            data-tooltip="Color by project">
                            <i class="ri-folder-chart-line"></i> Projects
                        </button>
                        <button class="ui-tab" data-year-breakdown="languages" role="tab"
                            data-tooltip="Color by language">
                            <i class="ri-code-s-slash-line"></i> Languages
                        </button>
                        <button class="ui-tab" data-year-breakdown="files" role="tab" data-tooltip="Color by file">
                            <i class="ri-file-list-3-line"></i> Files
                        </button>
                    </div>
                    <div id="yearBreakdownList" class="mt-4 grid gap-3"></div>
                </div>
            </section>
        </div>
    </main>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>

</html>
